<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast Final Fix</title>
    <style>
        :root {
            --bg: #060912;
            --panel: #161b2d;
            --accent: #00f2ff;
            --cell-size: clamp(35px, 10.5vw, 50px);
        }
        body {
            margin: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center;
            font-family: sans-serif; color: white;
            touch-action: none; overflow: hidden; height: 100vh;
        }
        #score { font-size: 42px; font-weight: bold; margin: 20px 0; color: var(--accent); }
        
        #grid-container { position: relative; padding: 8px; background: var(--panel); border-radius: 12px; }
        #grid {
            display: grid; grid-template-columns: repeat(8, var(--cell-size));
            grid-template-rows: repeat(8, var(--cell-size));
            gap: 4px;
        }
        .cell {
            width: var(--cell-size); height: var(--cell-size);
            background: rgba(255, 255, 255, 0.05); border-radius: 4px;
        }
        .cell.highlight { background: rgba(0, 242, 255, 0.4) !important; }
        .block-unit { width: 100%; height: 100%; border-radius: 4px; box-shadow: inset 0 0 8px rgba(0,0,0,0.5); }

        #dock {
            margin-top: 40px; display: flex; justify-content: space-around;
            width: 100%; max-width: 400px; height: 120px;
        }
        .shape-container {
            width: 100px; height: 100px; display: flex; align-items: center; justify-content: center;
            cursor: grab; touch-action: none;
        }
        .shape-grid { display: grid; gap: 2px; pointer-events: none; }
        .mini-block { width: calc(var(--cell-size) * 0.7); height: calc(var(--cell-size) * 0.7); border-radius: 3px; }
    </style>
</head>
<body>

    <div id="score">0</div>
    <div id="grid-container"><div id="grid"></div></div>
    <div id="dock"></div>

<script>
    const gridEl = document.getElementById('grid');
    const dockEl = document.getElementById('dock');
    const scoreEl = document.getElementById('score');
    const size = 8;
    let board = Array(size).fill().map(() => Array(size).fill(0));
    let score = 0;

    // ИСПРАВЛЕННЫЕ ФИГУРЫ (Каждый ряд — это отдельный массив в [ ])
    const SHAPES = [
        { c: '#00f2ff', m: [[1,1],[1,1]] }, // Квадрат
        { c: '#7000ff', m: [[1,1,1]] },     // Линия 3
        { c: '#ff0077', m: [[1],[1],[1]] }, // Линия 3 верт
        { c: '#00ff88', m: [[1,1],[1,0]] }, // Уголок
        { c: '#ffffff', m: [[1]] },         // Точка
        { c: '#ffaa00', m: [[1,1,1,1]] }    // Линия 4
    ];

    function init() {
        gridEl.innerHTML = '';
        for (let r = 0; r < size; r++) {
            for (let c = 0; c < size; c++) {
                const div = document.createElement('div');
                div.className = 'cell';
                div.id = `c-${r}-${c}`;
                gridEl.appendChild(div);
            }
        }
        refill();
    }

    function refill() {
        dockEl.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            const data = SHAPES[Math.floor(Math.random() * SHAPES.length)];
            const cont = document.createElement('div');
            cont.className = 'shape-container';
            const g = document.createElement('div');
            g.className = 'shape-grid';
            // Определяем количество колонок по самому длинному ряду
            const cols = data.m[0].length;
            g.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            
            data.m.forEach(row => row.forEach(v => {
                const b = document.createElement('div');
                b.className = 'mini-block';
                if(v) { b.style.background = data.c; }
                else b.style.opacity = 0;
                g.appendChild(b);
            }));
            
            cont.appendChild(g);
            cont.dataset.shape = JSON.stringify(data);
            attachEvents(cont);
            dockEl.appendChild(cont);
        }
    }

    function attachEvents(el) {
        let dragging = false;
        let x0, y0;

        el.onpointerdown = (e) => {
            dragging = true;
            x0 = e.clientX; y0 = e.clientY;
            el.setPointerCapture(e.pointerId);
            el.style.zIndex = "1000";
        };

        el.onpointermove = (e) => {
            if (!dragging) return;
            const dx = e.clientX - x0;
            const dy = e.clientY - y0;
            el.style.transform = `translate(${dx}px, ${dy - 120}px) scale(1.1)`;

            clearHighlights();
            const pos = getGridPos(e.clientX, e.clientY - 120);
            if(pos) {
                const shape = JSON.parse(el.dataset.shape);
                highlightGhost(shape.m, pos.r, pos.c);
            }
        };

        el.onpointerup = (e) => {
            if (!dragging) return;
            dragging = false;
            el.style.zIndex = "1";
            clearHighlights();
            
            const pos = getGridPos(e.clientX, e.clientY - 120);
            const shape = JSON.parse(el.dataset.shape);

            if (pos && canPlace(shape.m, pos.r, pos.c)) {
                place(shape, pos.r, pos.c);
                el.remove();
                checkLines();
                if (dockEl.children.length === 0) refill();
            } else {
                el.style.transform = '';
            }
        };
    }

    function getGridPos(clientX, clientY) {
        const gridRect = gridEl.getBoundingClientRect();
        const cellSize = gridRect.width / 8;
        const r = Math.floor((clientY - gridRect.top) / cellSize);
        const c = Math.floor((clientX - gridRect.left) / cellSize);
        if (r >= 0 && r < size && c >= 0 && c < size) return { r, c };
        return null;
    }

    function highlightGhost(m, r, c) {
        if(!canPlace(m, r, c)) return;
        m.forEach((row, i) => row.forEach((v, j) => {
            if(v) {
                const cell = document.getElementById(`c-${r+i}-${c+j}`);
                if(cell) cell.classList.add('highlight');
            }
        }));
    }

    function clearHighlights() {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight'));
    }

    function canPlace(m, r, c) {
        for(let i=0; i<m.length; i++) {
            for(let j=0; j<m[i].length; j++) {
                if(m[i][j]) {
                    const nr = r + i, nc = c + j;
                    if(nr < 0 || nr >= size || nc < 0 || nc >= size || board[nr][nc]) return false;
                }
            }
        }
        return true;
    }

    function place(s, r, c) {
        s.m.forEach((row, i) => row.forEach((v, j) => {
            if(v) {
                board[r+i][c+j] = 1;
                const cell = document.getElementById(`c-${r+i}-${c+j}`);
                cell.innerHTML = `<div class="block-unit" style="background:${s.c}"></div>`;
                score += 10;
            }
        }));
        scoreEl.innerText = score;
    }

    function checkLines() {
        let rClear = [], cClear = [];
        for(let i=0; i<size; i++) {
            if(board[i].every(v => v === 1)) rClear.push(i);
            if(board.map(row => row[i]).every(v => v === 1)) cClear.push(i);
        }
        rClear.forEach(r => { for(let c=0; c<size; c++) { board[r][c] = 0; document.getElementById(`c-${r}-${c}`).innerHTML = ''; } });
        cClear.forEach(c => { for(let r=0; r<size; r++) { board[r][c] = 0; document.getElementById(`c-${r}-${c}`).innerHTML = ''; } });
        if(rClear.length || cClear.length) score += (rClear.length + cClear.length) * 100;
        scoreEl.innerText = score;
    }

    init();
</script>
</body>
</html>
